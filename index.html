<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prometheus-Fund | AI 风险投资终端</title>
    <style>
        :root {
            --bg: #050814;
            --panel: #0b1021;
            --gold: #ffd700;
            --cyan: #00f3ff;
            --green: #00ff66;
            --red: #ff2a2a;
            --text-main: #e0e5ff;
        }
        body {
            background-color: var(--bg); color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;
        }
        header {
            text-align: center; padding-bottom: 15px; border-bottom: 1px solid var(--cyan); margin-bottom: 20px;
        }
        header h1 { margin: 0; color: var(--gold); text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); letter-spacing: 2px; }
        header p { margin: 5px 0 0 0; font-size: 12px; color: var(--cyan); }
        
        .dashboard { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        .panel {
            background: var(--panel); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 8px;
            padding: 15px; flex: 1; display: flex; flex-direction: column;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .panel h3 { margin-top: 0; color: var(--cyan); border-bottom: 1px dashed #334; padding-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .log-box { flex: 1; overflow-y: auto; font-size: 12px; line-height: 1.6; }
        .log-box::-webkit-scrollbar { width: 4px; } .log-box::-webkit-scrollbar-thumb { background: var(--cyan); }
        
        .center-panel { flex: 1.5; align-items: center; justify-content: flex-start; border-color: var(--gold); }
        
        /* 核心分数雷达环 */
        .score-circle {
            width: 180px; height: 180px; border-radius: 50%; border: 4px solid #333;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin: 20px 0; transition: all 0.5s ease; position: relative;
        }
        .score-circle .score { font-size: 48px; font-weight: bold; color: #555; }
        .score-circle .label { font-size: 12px; opacity: 0.7; }
        
        .score-circle.evaluating { border-color: var(--cyan); box-shadow: 0 0 30px rgba(0, 243, 255, 0.3); animation: spinPulse 2s infinite; }
        .score-circle.evaluating .score { color: var(--cyan); }
        .score-circle.approved { border-color: var(--gold); box-shadow: 0 0 50px rgba(255, 215, 0, 0.6); }
        .score-circle.approved .score { color: var(--gold); text-shadow: 0 0 10px var(--gold); }
        
        @keyframes spinPulse { 0% { box-shadow: 0 0 10px var(--cyan); } 50% { box-shadow: 0 0 40px var(--cyan); } 100% { box-shadow: 0 0 10px var(--cyan); } }
        
        .matrix { width: 100%; margin-top: 15px; font-size: 13px; background: #050814; padding: 10px; border: 1px solid #223; }
        .matrix-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .bar-bg { width: 50%; background: #222; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 4px; }
        .bar-fill { height: 100%; width: 0%; background: var(--cyan); transition: width 1s ease-in-out; }
        
        .highlight { color: var(--gold); font-weight: bold; }
        .text-green { color: var(--green); }
        .text-cyan { color: var(--cyan); }
    </style>
</head>
<body>

    <header>
        <h1>🏛️ PROMETHEUS AUTONOMOUS VC</h1>
        <p>NETWORK: OKX X LAYER | AGENT TRADE KIT: ONLINE | TREASURY BALANCE: 5,420,000 USDC</p>
        <button id="connect-wallet" style="margin-top: 10px; padding: 8px 15px; background: #000; border: 1px solid var(--cyan); color: var(--cyan); border-radius: 4px; cursor: pointer; font-family: inherit; font-weight: bold; transition: all 0.3s;">
            🔌 CONNECT OKX WALLET TO PITCH
        </button>
    </header>

    <div class="dashboard">
        <div class="panel">
            <h3>📡 GitHub Repo Scanner</h3>
            <div class="log-box" id="scanner-log"></div>
        </div>

        <div class="panel center-panel">
            <h3>🧠 LLM Tech-Evaluator</h3>
            <div class="score-circle" id="main-score">
                <div class="score" id="score-val">--</div>
                <div class="label">Innovation Score</div>
            </div>
            
            <div class="matrix" id="matrix-box" style="opacity: 0.3;">
                <div class="matrix-row"><span>Cryptography</span><div class="bar-bg"><div class="bar-fill" id="bar-crypto"></div></div></div>
                <div class="matrix-row"><span>Gas Optimization</span><div class="bar-bg"><div class="bar-fill" id="bar-gas"></div></div></div>
                <div class="matrix-row"><span>Architecture Elegance</span><div class="bar-bg"><div class="bar-fill" id="bar-arch"></div></div></div>
            </div>
            <h4 id="decision-text" style="color:#555; margin-top:20px; font-size:18px;">WAITING FOR SUBMISSION...</h4>
        </div>

        <div class="panel">
            <h3>⚙️ OKX Trade Kit (Treasury)</h3>
            <div class="log-box" id="execution-log"></div>
        </div>
    </div>

    <script>
        document.getElementById('connect-wallet').addEventListener('click', async () => {
            const btn = document.getElementById('connect-wallet');
            btn.innerText = "Connecting to OKX Web3...";
            setTimeout(() => {
                btn.style.background = "var(--cyan)";
                btn.style.color = "#000";
                btn.innerHTML = "✅ WALLET CONNECTED: 0x9f8...3aB | STAKE 50 USDC";
                addLog('scanner-log', `<br><span style="color:var(--gold)"><b>[TX] Stake-to-Pitch Transaction Confirmed via OKX Wallet.</b></span><br>`, 0);
            }, 1500);
        });
        function addLog(id, text, delay) { setTimeout(() => { document.getElementById(id).innerHTML += `<div>${text}</div>`; document.getElementById(id).scrollTop = 9999; }, delay); }
        function randomHash() { return '0x' + Math.random().toString(16).substr(2, 40); }

        // 步骤 1：背景扫街 (模拟拒掉平庸项目)
        setInterval(() => { addLog('scanner-log', `[SKIP] github.com/user/meme-coin-bot -> <span style="color:#ff2a2a">Score 32 (Forked code)</span>`, 0); }, 1500);

        // 步骤 2：剧本开始 - 捕获优质极客项目
        setTimeout(() => {
            addLog('scanner-log', `<br><span class="text-cyan"><b>[NEW SUBMISSION DETECTED]</b></span>`, 0);
            addLog('scanner-log', `Target: github.com/0xGeek/ZK-Darkpool-Engine`, 500);
            addLog('scanner-log', `Action: Cloning repository... Extracting Solidity AST...`, 1500);

            // 中间面板联动
            setTimeout(() => {
                document.getElementById('main-score').className = 'score-circle evaluating';
                document.getElementById('decision-text').innerText = 'ANALYZING SMART CONTRACTS...';
                document.getElementById('decision-text').style.color = 'var(--cyan)';
                document.getElementById('matrix-box').style.opacity = '1';
                
                // 进度条动画
                setTimeout(() => { document.getElementById('bar-crypto').style.width = '95%'; document.getElementById('score-val').innerText = '35'; }, 500);
                setTimeout(() => { document.getElementById('bar-gas').style.width = '82%'; document.getElementById('score-val').innerText = '68'; }, 1500);
                setTimeout(() => { document.getElementById('bar-arch').style.width = '90%'; document.getElementById('score-val').innerText = '89'; }, 2500);
            }, 2000);

            // 步骤 3：高潮 - 打款执行
            setTimeout(() => {
                document.getElementById('main-score').className = 'score-circle approved';
                document.getElementById('score-val').innerText = '89';
                document.getElementById('decision-text').innerHTML = '<span class="highlight">✅ APPROVED FOR SEED FUNDING</span>';
                
                addLog('execution-log', `<span class="text-cyan">[AGENT CALL] Waking up OKX Agent Trade Kit...</span>`, 0);
                addLog('execution-log', `> Estimating Gas for target contract...`, 1000);
                addLog('execution-log', `> Building Transfer Tx: <span class="highlight">10,000 USDC</span>`, 2000);
                addLog('execution-log', `> Signing with TEE Enclave Key...`, 3000);
                addLog('execution-log', `<br><span class="text-green"><b>[BROADCAST SUCCESS] Liquidity Injected!</b></span>`, 4500);
                addLog('execution-log', `TxHash: <span class="text-cyan">${randomHash()}</span>`, 5000);
                addLog('execution-log', `Block: #4892011 | X Layer`, 5500);
            }, 6000);

        }, 5000);
    </script>
</body>
</html>
